<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partners Mortgage — LO Onboarding CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>

  :root {
    --teal:#00818D; --teal-dark:#005f68; --teal-light:#e8f6f7;
    --taupe:#8A7E78; --gold:#FFAC27; --gold-light:#fff5e0;
    --white:#ffffff; --offwhite:#fafaf9; --dark:#1a2325;
    --light-border:#e2ddd9; --success:#2ecc71;
    --shadow-sm:0 1px 3px rgba(0,129,141,.08);
    --shadow-md:0 4px 16px rgba(0,129,141,.12);
    --shadow-lg:0 8px 32px rgba(0,129,141,.16);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Barlow',sans-serif;background:var(--offwhite);color:var(--dark);min-height:100vh;overflow-x:hidden}

  /* HEADER */
  .header{background:var(--white);border-bottom:1px solid var(--light-border);padding:0 20px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
  .header-brand{display:flex;align-items:center;gap:12px}
  .header-logo{width:40px;height:40px;border-radius:10px;overflow:hidden;background:#111;flex-shrink:0}
  .header-logo img{width:100%;height:100%;object-fit:cover;display:block}
  .header-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--teal);letter-spacing:.04em;text-transform:uppercase}
  .header-subtitle{font-size:11px;color:var(--taupe);letter-spacing:.06em;text-transform:uppercase}
  .header-actions{display:flex;align-items:center;gap:8px}

  /* BUTTONS */
  .btn-primary{background:var(--teal);color:white;border:none;border-radius:8px;padding:8px 18px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .18s,transform .1s;display:flex;align-items:center;gap:6px}
  .btn-primary:hover{background:var(--teal-dark);transform:translateY(-1px)}
  .btn-ghost{background:transparent;color:var(--taupe);border:1px solid var(--light-border);border-radius:8px;padding:8px 14px;font-family:'Barlow',sans-serif;font-size:13px;cursor:pointer;transition:border-color .18s,color .18s}
  .btn-ghost:hover{border-color:var(--teal);color:var(--teal)}
  .btn-edit-info{background:var(--offwhite);color:var(--teal);border:1px solid var(--teal-light);border-radius:7px;padding:5px 12px;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s,border-color .15s;white-space:nowrap}
  .btn-edit-info:hover{background:var(--teal-light);border-color:var(--teal)}
  .btn-mobile-list{display:none;background:var(--teal);color:white;border:none;border-radius:8px;padding:8px 14px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;gap:6px;align-items:center}

  /* LAYOUT */
  .app-layout{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 64px)}

  /* SIDEBAR */
  .sidebar{background:var(--white);border-right:1px solid var(--light-border);overflow-y:auto}
  .sidebar-search{padding:12px 14px;border-bottom:1px solid var(--light-border)}
  .search-input{width:100%;border:1px solid var(--light-border);border-radius:8px;padding:7px 10px 7px 32px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--dark);background:var(--offwhite);outline:none;transition:border-color .15s}
  .search-input:focus{border-color:var(--teal)}
  .sidebar-section-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--taupe);padding:14px 18px 5px}
  .pipeline-item{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
  .pipeline-item:hover,.pipeline-item.active{background:var(--teal-light);border-left-color:var(--teal)}
  .pipeline-item-info{display:flex;align-items:center;gap:9px;min-width:0}
  .pipeline-avatar{border-radius:50%;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:white}
  .pipeline-name{font-size:13px;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
  .pipeline-stage{font-size:11px;color:var(--taupe)}
  .stage-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
  .badge-preboard{background:#fff5e0;color:#b07a00}
  .badge-onboard{background:var(--teal-light);color:var(--teal-dark)}
  .badge-integrate{background:#edf9f0;color:#1a7a40}
  .badge-complete{background:#f0f0f0;color:#666}

  /* MOBILE SLIDE-OVER LIST */
  .mobile-list-panel{display:none;position:fixed;inset:0;z-index:200;background:rgba(26,35,37,.5)}
  .mobile-list-inner{position:absolute;top:0;left:0;bottom:0;width:290px;background:var(--white);overflow-y:auto;transform:translateX(-100%);transition:transform .25s ease;box-shadow:var(--shadow-lg)}
  .mobile-list-panel.open .mobile-list-inner{transform:translateX(0)}
  .mobile-list-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--light-border);background:var(--teal);color:white}
  .mobile-list-header span{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
  .mobile-list-close{background:rgba(255,255,255,.15);border:none;color:white;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

  /* MAIN */
  .main-content{padding:26px;overflow-y:auto}
  .dashboard-view.hidden{display:none}
  .gold-accent-bar{height:3px;background:linear-gradient(90deg,var(--gold),var(--teal));border-radius:2px;margin-bottom:22px}

  /* STATS */
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
  .stat-card{background:var(--white);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow-sm);border:1px solid var(--light-border);position:relative;overflow:hidden}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
  .stat-card.teal::before{background:var(--teal)}
  .stat-card.gold::before{background:var(--gold)}
  .stat-card.green::before{background:var(--success)}
  .stat-card.taupe::before{background:var(--taupe)}
  .stat-number{font-family:'Lora',serif;font-size:30px;font-weight:700;color:var(--dark);line-height:1}
  .stat-label{font-size:11px;color:var(--taupe);margin-top:4px;font-weight:500;letter-spacing:.03em;text-transform:uppercase}
  .stat-volume{font-size:12px;color:var(--teal);font-weight:600;margin-top:4px}

  /* DIVIDERS */
  .section-divider{display:flex;align-items:center;gap:12px;margin:26px 0 18px}
  .section-divider h3{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dark);white-space:nowrap}
  .divider-line{flex:1;height:1px;background:var(--light-border)}
  .gold-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0}

  /* PIPELINE BOARD */
  .pipeline-board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
  .pipeline-col{background:var(--offwhite);border-radius:12px;border:1px solid var(--light-border);overflow:hidden}
  .pipeline-col-header{padding:12px 14px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--light-border)}
  .col-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
  .col-count{background:var(--white);border:1px solid var(--light-border);border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700;color:var(--taupe)}
  .col-volume{font-size:11px;font-weight:600;opacity:.85}
  .pipeline-cards{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:100px}
  .pipeline-card{background:var(--white);border-radius:10px;padding:11px 13px;box-shadow:var(--shadow-sm);border:1px solid var(--light-border);cursor:pointer;transition:box-shadow .15s,transform .1s;border-left:3px solid transparent}
  .pipeline-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
  .pc-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .pc-name{font-size:13px;font-weight:600;color:var(--dark);flex:1}
  .pc-volume{font-size:11px;font-weight:700;color:#8a6000;background:var(--gold-light);border:1px solid #ffd080;padding:1px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0}
  .pc-meta{font-size:11px;color:var(--taupe);margin-bottom:7px}
  .pc-bar{height:4px;background:var(--light-border);border-radius:2px;overflow:hidden}
  .pc-fill{height:100%;border-radius:2px;transition:width .5s ease}
  .pc-pct{font-size:10px;color:var(--taupe);margin-top:4px;text-align:right}

  /* DETAIL */
  .detail-panel{display:none;animation:fadeIn .2s ease}
  .detail-panel.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--taupe);cursor:pointer;margin-bottom:20px;font-weight:500;width:fit-content;transition:color .15s}
  .back-btn:hover{color:var(--teal)}
  .lo-header-card{background:var(--white);border-radius:14px;padding:22px 26px;box-shadow:var(--shadow-sm);border:1px solid var(--light-border);margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .lo-header-left{display:flex;align-items:center;gap:16px}
  .lo-avatar-large{width:52px;height:52px;border-radius:12px;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;color:white;flex-shrink:0}
  .lo-name-block h2{font-family:'Lora',serif;font-size:21px;font-weight:700;color:var(--dark)}
  .lo-name-block p{color:var(--taupe);font-size:12px;margin-top:2px}
  .lo-vol-badge{display:inline-flex;align-items:center;gap:5px;background:var(--gold-light);border:1px solid #ffd080;color:#8a6000;border-radius:8px;padding:5px 12px;font-size:14px;font-weight:700;margin-top:7px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.04em}
  .lo-header-meta{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .meta-item{text-align:center}
  .meta-value{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--teal)}
  .meta-label{font-size:10px;color:var(--taupe);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
  .progress-ring{width:58px;height:58px;position:relative;flex-shrink:0}
  .progress-ring svg{transform:rotate(-90deg)}
  .progress-ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--teal)}

  /* CHECKLISTS */
  .checklist-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}
  .checklist-card{background:var(--white);border-radius:14px;box-shadow:var(--shadow-sm);border:1px solid var(--light-border);overflow:hidden}
  .checklist-card.full-width{grid-column:1/-1}
  .cl-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--light-border)}
  .cl-header-left{display:flex;align-items:center;gap:9px}
  .section-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .icon-teal{background:var(--teal-light)}
  .icon-gold{background:var(--gold-light)}
  .icon-green{background:#edf9f0}
  .cl-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dark)}
  .cl-prog{font-size:12px;color:var(--taupe);font-weight:500}
  .cl-items{padding:10px 0}
  .cl-item{display:flex;align-items:flex-start;gap:9px;padding:7px 18px;transition:background .12s;cursor:pointer}
  .cl-item:hover{background:var(--offwhite)}
  .cl-item.done .item-text{color:var(--taupe);text-decoration:line-through}
  .check-box{width:17px;height:17px;border-radius:5px;border:2px solid var(--light-border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s;font-size:10px;color:white}
  .cl-item.done .check-box{background:var(--teal);border-color:var(--teal)}
  .item-text{font-size:13px;color:var(--dark);line-height:1.4;flex:1}
  .item-tag{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--gold-light);color:#b07a00;font-weight:600;flex-shrink:0;align-self:flex-start;margin-top:2px}

  /* AIRTABLE */
  .airtable-card{background:var(--white);border-radius:14px;box-shadow:var(--shadow-sm);border:1px solid var(--light-border);overflow:hidden;margin-bottom:22px}
  .at-header{padding:14px 18px;border-bottom:1px solid var(--light-border);display:flex;align-items:center;justify-content:space-between}
  .at-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dark);display:flex;align-items:center;gap:7px}
  .airtable-frame{width:100%;height:500px;border:none;display:block}

  /* NOTES */
  .notes-area{background:var(--white);border-radius:14px;padding:18px;box-shadow:var(--shadow-sm);border:1px solid var(--light-border)}
  .notes-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dark);margin-bottom:9px;display:flex;align-items:center;gap:6px}
  .notes-textarea{width:100%;border:1px solid var(--light-border);border-radius:8px;padding:9px 11px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--dark);resize:vertical;min-height:75px;outline:none;transition:border-color .15s;background:var(--offwhite)}
  .notes-textarea:focus{border-color:var(--teal);background:white}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(26,35,37,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--white);border-radius:16px;width:100%;max-width:560px;box-shadow:var(--shadow-lg);transform:translateY(20px);transition:transform .2s;overflow:hidden;max-height:90vh;overflow-y:auto}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-header{background:var(--teal);padding:18px 22px;color:white;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1}
  .modal-header h3{font-family:'Lora',serif;font-size:19px;font-weight:700}
  .modal-header p{font-size:12px;opacity:.8;margin-top:2px}
  .modal-close{background:rgba(255,255,255,.15);border:none;color:white;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
  .modal-close:hover{background:rgba(255,255,255,.25)}
  .modal-body{padding:22px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
  .form-group{display:flex;flex-direction:column;gap:4px}
  .form-group label{font-size:11px;font-weight:700;color:var(--taupe);text-transform:uppercase;letter-spacing:.05em}
  .form-group input{border:1px solid var(--light-border);border-radius:8px;padding:8px 11px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--dark);outline:none;transition:border-color .15s;background:var(--offwhite)}
  .form-group input:focus{border-color:var(--teal);background:white}
  .modal-footer{padding:14px 22px;border-top:1px solid var(--light-border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--white)}

  /* RESPONSIVE */
  @media(max-width:900px){
    .app-layout{grid-template-columns:1fr}
    .sidebar{display:none}
    .btn-mobile-list{display:flex}
    .stats-bar{grid-template-columns:1fr 1fr}
    .checklist-grid{grid-template-columns:1fr}
    .pipeline-board{grid-template-columns:1fr}
    .mobile-list-panel{display:block}
    .lo-header-card{flex-direction:column;align-items:flex-start}
    .form-row{grid-template-columns:1fr}
  }

</style>
</head>

          <div class="pipeline-col-header" style="color:#1a7a40;background:#edf9f0">

</div>

<!-- ADD / EDIT MODAL (shared) -->

      </div>

<script>
const PREBOARD = [
  {id:'pb1',text:'Recruiter sends LOI',tag:null},
  {id:'pb2',text:'Recruiter receives accepted LOI',tag:null},
  {id:'pb3',text:'BIO sent by recruiter to Leadership Team',tag:null},
  {id:'pb4',text:'Send Pre-Hire paperwork via DocuSign',tag:'DocuSign'},
  {id:'pb5',text:'Paperwork completed in DocuSign',tag:'DocuSign'},
  {id:'pb6',text:'Contract sent through DocuSign',tag:'DocuSign'},
  {id:'pb7',text:'Contract returned through DocuSign',tag:'DocuSign'},
  {id:'pb8',text:'Add to Roster',tag:null},
];
const ONBOARD = [
  {id:'ob1',text:'Add to GHL-WorkDesk',tag:'WorkDesk'},
  {id:'ob2',text:'Send Welcome email with Greenlight booking link & Onboarding Journey doc',tag:null},
  {id:'ob3',text:'Following day — warm welcome & confirm Greenlight call booked',tag:null},
  {id:'ob4',text:'Verify Greenlight setup complete in Airtable',tag:'Airtable'},
  {id:'ob5',text:'Schedule Orientation',tag:null},
  {id:'ob6',text:'Send warm email: Essential Resources, LO/LOA/Processor loan flow, responsibilities',tag:null},
  {id:'ob7',text:'Add to GHL WorkDesk (confirm)',tag:'WorkDesk'},
  {id:'ob8',text:'Intro to Cusseleration',tag:null},
  {id:'ob9',text:'Add to Teachables',tag:'Teachables'},
  {id:'ob10',text:'Bio and expected production to Processor Manager & Transition Manager',tag:null},
  {id:'ob11',text:'Intro to Processor Manager and Transition Manager',tag:null},
  {id:'ob12',text:'Processor Manager sends "Meet your team" email',tag:null},
];
const INTEGRATE = [
  {id:'it1',text:'Verify Orientation Attendance',tag:null},
  {id:'it2',text:'Verify License Transfer',tag:'Licensing'},
  {id:'it3',text:'Send top 5 Lender Credentials',tag:null},
  {id:'it4',text:'Verify Lender Price Credentials',tag:'Lender Price'},
  {id:'it5',text:'Verify ARIVE Credentials',tag:'ARIVE'},
  {id:'it6',text:'Send Partners Credit Credentials',tag:null},
  {id:'it7',text:'Track ARIVE for 1st Funding',tag:'ARIVE'},
  {id:'it8',text:'1st Funding Celebration Slide',tag:null},
];
const ALL_TASKS = [...PREBOARD, ...ONBOARD, ...INTEGRATE];
const COLORS = ['#00818D','#2d6a73','#3a5a7a','#5a7a3a','#7a5a3a','#6a3a7a','#3a7a5a','#7a3a5a'];
const STORAGE_KEY = 'pm_los_v5';

let los = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
// Migrate from older keys
if (!los) {
  for (const k of ['pm_los_v4','pm_los_v3','pm_los_v2','pm_los']) {
    const old = localStorage.getItem(k);
    if (old) { try { los = JSON.parse(old); break; } catch(e) {} }
  }
}
let selectedLO = null;

if (!los) {
  function mkChecks(done) {
    const ch = {};
    ALL_TASKS.forEach(t => ch[t.id] = false);
    done.forEach(id => ch[id] = true);
    return ch;
  }
  los = [
    {id:'lo_1',first:'Sarah',last:'Mitchell',email:'smitchell@email.com',phone:'(916) 555-0123',nmls:'987654',startDate:'2025-03-15',recruiter:'Peter Schwartz',branch:'Roseville, CA',volume:18,notes:'Strong refi background. 10yr veteran.',
      checks:mkChecks(['pb1','pb2','pb3','pb4','pb5','pb6'])},
    {id:'lo_2',first:'Marcus',last:'Lee',email:'mlee@email.com',phone:'(916) 555-0456',nmls:'234567',startDate:'2025-03-18',recruiter:'Peter Schwartz',branch:'Sacramento, CA',volume:32,notes:'Former Chase LO. High purchase volume.',
      checks:mkChecks(['pb1','pb2','pb3','pb4','pb5','pb6','pb7','pb8','ob1','ob2','ob3','ob4','ob5','ob6'])},
    {id:'lo_3',first:'Elena',last:'Rodriguez',email:'erodriguez@email.com',phone:'(714) 555-0789',nmls:'345678',startDate:'2025-03-01',recruiter:'Dan Trinidad',branch:'Orange County, CA',volume:45,notes:'All completed. First funding on track.',
      checks:mkChecks(['pb1','pb2','pb3','pb4','pb5','pb6','pb7','pb8','ob1','ob2','ob3','ob4','ob5','ob6','ob7','ob8','ob9','ob10','ob11','ob12','it1','it2','it3','it4','it5','it6','it7'])},
  ];
}
saveLOs();

function saveLOs() { localStorage.setItem(STORAGE_KEY, JSON.stringify(los)); }
function getColor(lo) { return COLORS[(lo.first.charCodeAt(0) + lo.last.charCodeAt(0)) % COLORS.length]; }
function getInitials(lo) { return (lo.first[0] + lo.last[0]).toUpperCase(); }

function getStage(lo) {
  const pb = PREBOARD.filter(t => lo.checks[t.id]).length;
  const ob = ONBOARD.filter(t => lo.checks[t.id]).length;
  const it = INTEGRATE.filter(t => lo.checks[t.id]).length;
  if (pb + ob + it === ALL_TASKS.length) return 'complete';
  if (it > 0 || ob === ONBOARD.length) return 'integrate';
  if (pb === PREBOARD.length || ob > 0) return 'onboard';
  return 'preboard';
}
function getPct(lo) { return Math.round(ALL_TASKS.filter(t => lo.checks[t.id]).length / ALL_TASKS.length * 100); }
function stageName(s) { return {preboard:'Pre-Boarding',onboard:'Onboarding',integrate:'Integration',complete:'Complete'}[s]; }
function stageBadge(s) { return {preboard:'badge-preboard',onboard:'badge-onboard',integrate:'badge-integrate',complete:'badge-complete'}[s]; }
function stageColor(s) { return {preboard:'#FFAC27',onboard:'#00818D',integrate:'#2ecc71',complete:'#8A7E78'}[s]; }
function fmtVol(v) {
  if (v === null || v === undefined || v === '') return '';
  const n = Number(v);
  if (isNaN(n) || n === 0) return '';
  if (n >= 1000) return '$' + (n/1000).toFixed(1).replace(/\.0$/,'') + 'B';
  return '$' + n + 'M';
}
function sumVol(arr) { return arr.reduce((a, lo) => a + (Number(lo.volume) || 0), 0); }
function el(id) { return document.getElementById(id); }

// ── MOBILE PANEL ─────────────────────────────────────────────
function showMobileList() {
  el('mobile-list-panel').classList.add('open');
}
function hideMobileList() {
  el('mobile-list-panel').classList.remove('open');
}

// ── SIDEBAR ───────────────────────────────────────────────────
function renderSidebar(filter) {
  filter = (filter || '').toLowerCase();
  const items = los.filter(lo => (lo.first + ' ' + lo.last).toLowerCase().includes(filter));
  renderLoList('sidebar-list', items);
  renderLoList('mobile-lo-list', items);
}
function renderLoList(containerId, items) {
  const out = el(containerId);
  if (!out) return;
  if (!items.length) { out.innerHTML = '<div style="padding:20px;text-align:center;color:var(--taupe);font-size:13px">No LOs found</div>'; return; }
  out.innerHTML = '';
  items.forEach(lo => {
    const s = getStage(lo);
    const vol = fmtVol(lo.volume);
    const active = selectedLO && selectedLO.id === lo.id;
    const div = document.createElement('div');
    div.className = 'pipeline-item' + (active ? ' active' : '');
    div.innerHTML =
      '<div class="pipeline-item-info">' +
        '<div class="pipeline-avatar" style="background:' + getColor(lo) + ';width:32px;height:32px;font-size:12px">' + getInitials(lo) + '</div>' +
        '<div>' +
          '<div class="pipeline-name">' + lo.first + ' ' + lo.last + '</div>' +
          '<div class="pipeline-stage">' + (vol || '—') + ' · ' + getPct(lo) + '%</div>' +
        '</div>' +
      '</div>' +
      '<span class="stage-badge ' + stageBadge(s) + '">' + stageName(s).split('-')[0] + '</span>';
    div.onclick = function() { selectLO(lo.id); hideMobileList(); };
    out.appendChild(div);
  });
}
function filterLOs(val) { renderSidebar(val); }

// ── DASHBOARD ──────────────────────────────────────────────────
function renderDashboard() {
  const byStage = s => los.filter(lo => getStage(lo) === s);
  const pre  = byStage('preboard');
  const ob   = byStage('onboard');
  const intg = byStage('integrate');
  const done = byStage('complete');
  const active = [...ob, ...intg];

  el('stat-total').textContent    = los.length;
  el('stat-preboard').textContent = pre.length;
  el('stat-onboard').textContent  = active.length;
  el('stat-complete').textContent = done.length;

  function volLabel(arr, sfx) { const v = sumVol(arr); return v ? fmtVol(v) + ' ' + sfx : ''; }
  el('stat-total-vol').textContent    = volLabel(los,    'total volume');
  el('stat-preboard-vol').textContent = volLabel(pre,    'in pipeline');
  el('stat-onboard-vol').textContent  = volLabel(active, 'in progress');
  el('stat-complete-vol').textContent = volLabel(done,   'onboarded');

  function mkCard(lo) {
    const pct = getPct(lo), s = getStage(lo), col = stageColor(s), vol = fmtVol(lo.volume);
    const div = document.createElement('div');
    div.className = 'pipeline-card';
    div.style.borderLeftColor = col;
    div.onclick = function() { selectLO(lo.id); };
    div.innerHTML =
      '<div class="pc-top">' +
        '<div class="pipeline-avatar" style="background:' + getColor(lo) + ';width:26px;height:26px;font-size:10px;border-radius:6px">' + getInitials(lo) + '</div>' +
        '<div class="pc-name">' + lo.first + ' ' + lo.last + '</div>' +
        (vol ? '<div class="pc-volume">' + vol + '</div>' : '') +
      '</div>' +
      '<div class="pc-meta">' + (lo.branch||'—') + ' · NMLS ' + (lo.nmls||'—') + '</div>' +
      '<div class="pc-bar"><div class="pc-fill" style="width:' + pct + '%;background:' + col + '"></div></div>' +
      '<div class="pc-pct">' + pct + '% complete</div>';
    return div;
  }
  function fillCol(elId, items) {
    const c = el(elId); c.innerHTML = '';
    if (!items.length) { c.innerHTML = '<div style="font-size:12px;color:var(--taupe);text-align:center;padding:16px 0">No LOs here</div>'; return; }
    items.forEach(lo => c.appendChild(mkCard(lo)));
  }
  fillCol('col-preboard', pre);
  fillCol('col-onboard', ob);
  fillCol('col-integrate', [...intg, ...done]);

  el('col-preboard-count').textContent  = pre.length;
  el('col-onboard-count').textContent   = ob.length;
  el('col-integrate-count').textContent = intg.length + done.length;

  function volTxt(arr) { const v = sumVol(arr); return v ? fmtVol(v) + ' total' : ''; }
  el('col-preboard-vol').textContent  = volTxt(pre);
  el('col-onboard-vol').textContent   = volTxt(ob);
  el('col-integrate-vol').textContent = volTxt([...intg, ...done]);
}

// ── NAVIGATION ─────────────────────────────────────────────────
function selectLO(id) {
  selectedLO = los.find(lo => lo.id === id);
  if (!selectedLO) return;
  el('dashboard').classList.add('hidden');
  el('detail-panel').classList.add('active');
  renderDetail();
  renderSidebar(el('searchInput').value);
}
function showDashboard() {
  selectedLO = null;
  el('dashboard').classList.remove('hidden');
  el('detail-panel').classList.remove('active');
  renderSidebar();
  renderDashboard();
}

// ── DETAIL VIEW ────────────────────────────────────────────────
function renderDetail() {
  const lo = selectedLO;
  if (!lo) return;
  const pct = getPct(lo), s = getStage(lo);
  const pbD = PREBOARD.filter(t => lo.checks[t.id]).length;
  const obD = ONBOARD.filter(t => lo.checks[t.id]).length;
  const itD = INTEGRATE.filter(t => lo.checks[t.id]).length;
  const circ = 2 * Math.PI * 24;
  const off  = circ - (pct / 100) * circ;
  const vol  = fmtVol(lo.volume);
  const startStr = lo.startDate ? new Date(lo.startDate + 'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';

  function mkItem(t) {
    const done = lo.checks[t.id];
    const div = document.createElement('div');
    div.className = 'cl-item' + (done ? ' done' : '');
    div.onclick = function() { toggleCheck(lo.id, t.id); };
    div.innerHTML =
      '<div class="check-box">' + (done ? '✓' : '') + '</div>' +
      '<div class="item-text">' + t.text + '</div>' +
      (t.tag ? '<span class="item-tag">' + t.tag + '</span>' : '');
    return div.outerHTML;
  }

  el('lo-detail-content').innerHTML =
    '<div class="lo-header-card">' +
      '<div class="lo-header-left">' +
        '<div class="lo-avatar-large" style="background:' + getColor(lo) + '">' + getInitials(lo) + '</div>' +
        '<div class="lo-name-block">' +
          '<h2>' + lo.first + ' ' + lo.last + '</h2>' +
          '<p>NMLS #' + (lo.nmls||'—') + ' &nbsp;·&nbsp; ' + (lo.branch||'—') + ' &nbsp;·&nbsp; Recruiter: ' + (lo.recruiter||'—') + '</p>' +
          (startStr ? '<p style="margin-top:2px;font-size:12px">Start: ' + startStr + '</p>' : '') +
          (vol ? '<div class="lo-vol-badge">&#128202; ' + vol + ' Annual Volume</div>' : '') +
        '</div>' +
      '</div>' +
      '<div class="lo-header-meta">' +
        '<div class="meta-item"><div class="meta-value">' + pbD + '/' + PREBOARD.length + '</div><div class="meta-label">Pre-Board</div></div>' +
        '<div class="meta-item"><div class="meta-value">' + obD + '/' + ONBOARD.length + '</div><div class="meta-label">Onboard</div></div>' +
        '<div class="meta-item"><div class="meta-value">' + itD + '/' + INTEGRATE.length + '</div><div class="meta-label">Integrate</div></div>' +
        '<div class="progress-ring">' +
          '<svg width="58" height="58" viewBox="0 0 60 60"><circle cx="30" cy="30" r="24" fill="none" stroke="#e2ddd9" stroke-width="5"/>' +
          '<circle cx="30" cy="30" r="24" fill="none" stroke="' + (pct===100?'#2ecc71':'#00818D') + '" stroke-width="5" stroke-dasharray="' + circ + '" stroke-dashoffset="' + off + '" stroke-linecap="round"/></svg>' +
          '<div class="progress-ring-text">' + pct + '%</div>' +
        '</div>' +
        '<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">' +
          '<span class="stage-badge ' + stageBadge(s) + '" style="font-size:11px;padding:4px 10px">' + stageName(s) + '</span>' +
          '<button class="btn-edit-info" id="edit-info-btn">&#9998; Edit Info</button>' +
        '</div>' +
      '</div>' +
    '</div>' +

    '<div class="checklist-grid">' +
      '<div class="checklist-card"><div class="cl-header"><div class="cl-header-left"><div class="section-icon icon-gold">📋</div><div class="cl-title">Pre-Boarding</div></div><span class="cl-prog">' + pbD + ' / ' + PREBOARD.length + '</span></div><div class="cl-items">' + PREBOARD.map(mkItem).join('') + '</div></div>' +
      '<div class="checklist-card"><div class="cl-header"><div class="cl-header-left"><div class="section-icon icon-teal">🚀</div><div class="cl-title">Onboarding</div></div><span class="cl-prog">' + obD + ' / ' + ONBOARD.length + '</span></div><div class="cl-items">' + ONBOARD.map(mkItem).join('') + '</div></div>' +
      '<div class="checklist-card full-width"><div class="cl-header"><div class="cl-header-left"><div class="section-icon icon-green">🔗</div><div class="cl-title">Integration</div></div><span class="cl-prog">' + itD + ' / ' + INTEGRATE.length + '</span></div><div class="cl-items" style="display:grid;grid-template-columns:1fr 1fr">' + INTEGRATE.map(mkItem).join('') + '</div></div>' +
    '</div>' +

    '<div class="section-divider"><div class="gold-dot"></div><h3>New Hire Form</h3><div class="divider-line"></div></div>' +
    '<div class="airtable-card"><div class="at-header"><div class="at-title"><span style="color:var(--gold)">⬡</span> Airtable — New Hire Onboarding</div>' +
    '<a href="https://airtable.com/appXCKvo1mU7Q6jDw/pagifkzSksjEPHJkQ/form" target="_blank" style="font-size:12px;color:var(--teal);text-decoration:none;font-weight:600">Open in new tab ↗</a></div>' +
    '<iframe class="airtable-frame" src="https://airtable.com/embed/appXCKvo1mU7Q6jDw/pagifkzSksjEPHJkQ/form" frameborder="0" allow="clipboard-write"></iframe></div>' +

    '<div class="notes-area">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">' +
        '<div class="notes-label"><span style="color:var(--gold)">✎</span> Recruiter Notes</div>' +
        '<div style="display:flex;gap:8px;align-items:center">' +
          '<label style="font-size:11px;font-weight:700;color:var(--taupe);text-transform:uppercase;letter-spacing:.05em">Volume ($M)</label>' +
          '<input type="number" id="lo-volume" value="' + (lo.volume||'') + '" placeholder="e.g. 24" min="0" step="0.5" style="border:1px solid var(--light-border);border-radius:6px;padding:5px 8px;font-family:Barlow,sans-serif;font-size:13px;width:90px;outline:none;background:var(--offwhite)">' +
        '</div>' +
      '</div>' +
      '<textarea class="notes-textarea" id="lo-notes" placeholder="Add notes...">' + (lo.notes||'') + '</textarea>' +
      '<div style="margin-top:8px;display:flex;gap:8px;justify-content:flex-end">' +
        '<button class="btn-ghost" style="font-size:12px" id="del-btn">🗑 Remove</button>' +
        '<button class="btn-primary" style="font-size:12px" id="save-btn">Save</button>' +
      '</div>' +
    '</div>';

  el('save-btn').onclick     = function() { saveDetail(lo.id); };
  el('del-btn').onclick      = function() { confirmDelete(lo.id); };
  el('edit-info-btn').onclick = function() { openEditModal(lo.id); };

  el('lo-detail-content').querySelectorAll('.cl-item').forEach((div, i) => {
    const t = ALL_TASKS[i];
    div.onclick = function() { toggleCheck(lo.id, t.id); };
  });
}

// ── CHECKLIST TOGGLE ──────────────────────────────────────────
function toggleCheck(loId, taskId) {
  const lo = los.find(l => l.id === loId);
  if (!lo) return;
  lo.checks[taskId] = !lo.checks[taskId];
  saveLOs(); selectedLO = lo; renderDetail();
  renderSidebar(el('searchInput').value);
}

// ── NOTES / VOLUME SAVE ────────────────────────────────────────
function saveDetail(loId) {
  const lo = los.find(l => l.id === loId);
  if (!lo) return;
  lo.notes = el('lo-notes').value;
  const v = el('lo-volume').value;
  lo.volume = (v !== '') ? Number(v) : null;
  saveLOs(); renderDetail();
  const btn = el('save-btn');
  if (btn) { btn.textContent = '✓ Saved'; btn.style.background = '#2ecc71'; setTimeout(() => { btn.textContent = 'Save'; btn.style.background = ''; }, 1500); }
}

// ── DELETE ─────────────────────────────────────────────────────
function confirmDelete(loId) {
  if (!confirm('Remove this LO from the pipeline?')) return;
  los = los.filter(l => l.id !== loId);
  saveLOs(); showDashboard();
}

// ── ADD MODAL ─────────────────────────────────────────────────
function openModal() {
  el('modal-title').textContent = 'Add New LO';
  el('modal-subtitle').textContent = 'Start the onboarding journey';
  el('modal-submit-btn').textContent = 'Add to Pipeline';
  el('modal-submit-btn').onclick = addLO;
  clearModalFields();
  el('modal').classList.add('open');
  el('f-first').focus();
}
function closeModal() { el('modal').classList.remove('open'); }
el('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

function clearModalFields() {
  ['f-first','f-last','f-email','f-phone','f-nmls','f-startdate','f-recruiter','f-branch','f-volume','f-notes'].forEach(id => el(id).value = '');
}

function addLO() {
  const first = el('f-first').value.trim();
  const last  = el('f-last').value.trim();
  if (!first || !last) { alert('Please enter a first and last name.'); return; }
  const checks = {};
  ALL_TASKS.forEach(t => checks[t.id] = false);
  const v = el('f-volume').value;
  const lo = {
    id: 'lo_' + Date.now(), first, last,
    email:     el('f-email').value.trim(),
    phone:     el('f-phone').value.trim(),
    nmls:      el('f-nmls').value.trim(),
    startDate: el('f-startdate').value,
    recruiter: el('f-recruiter').value.trim(),
    branch:    el('f-branch').value.trim(),
    volume:    v !== '' ? Number(v) : null,
    notes:     el('f-notes').value.trim(),
    checks,
  };
  los.unshift(lo);
  saveLOs(); closeModal(); clearModalFields(); selectLO(lo.id);
}

// ── EDIT MODAL ────────────────────────────────────────────────
function openEditModal(loId) {
  const lo = los.find(l => l.id === loId);
  if (!lo) return;
  el('modal-title').textContent    = 'Edit LO Info';
  el('modal-subtitle').textContent = lo.first + ' ' + lo.last;
  el('f-first').value     = lo.first || '';
  el('f-last').value      = lo.last  || '';
  el('f-email').value     = lo.email || '';
  el('f-phone').value     = lo.phone || '';
  el('f-nmls').value      = lo.nmls  || '';
  el('f-startdate').value = lo.startDate || '';
  el('f-recruiter').value = lo.recruiter || '';
  el('f-branch').value    = lo.branch    || '';
  el('f-volume').value    = lo.volume != null ? lo.volume : '';
  el('f-notes').value     = lo.notes  || '';
  el('modal-submit-btn').textContent = 'Save Changes';
  el('modal-submit-btn').onclick = function() { saveEditedLO(loId); };
  el('modal').classList.add('open');
  el('f-first').focus();
}

function saveEditedLO(loId) {
  const lo = los.find(l => l.id === loId);
  if (!lo) return;
  const first = el('f-first').value.trim();
  const last  = el('f-last').value.trim();
  if (!first || !last) { alert('Please enter a first and last name.'); return; }
  lo.first     = first;
  lo.last      = last;
  lo.email     = el('f-email').value.trim();
  lo.phone     = el('f-phone').value.trim();
  lo.nmls      = el('f-nmls').value.trim();
  lo.startDate = el('f-startdate').value;
  lo.recruiter = el('f-recruiter').value.trim();
  lo.branch    = el('f-branch').value.trim();
  const v = el('f-volume').value;
  lo.volume    = v !== '' ? Number(v) : null;
  lo.notes     = el('f-notes').value.trim();
  saveLOs();
  closeModal();
  selectedLO = lo;
  renderDetail();
  renderSidebar(el('searchInput').value);
}

// ── INIT ──────────────────────────────────────────────────────
renderSidebar();
renderDashboard();

</script>
</body>
